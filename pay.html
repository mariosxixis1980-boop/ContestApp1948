<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Αγορά HELP • CMP</title>
  <style>
:root{
  --bg:#070b13;--b:rgba(255,255,255,.12);
  --t:#eaf1ff;--m:rgba(255,255,255,.65);
  --g:rgba(46,204,113,.20);--a:rgba(241,196,15,.16);--r:rgba(231,76,60,.14);--bl:rgba(52,152,219,.18);
}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
body{margin:0;min-height:100vh;padding:14px;color:var(--t);
background:
radial-gradient(900px 700px at 20% 0%,rgba(40,110,255,.25),transparent 55%),
radial-gradient(900px 700px at 80% 10%,rgba(0,255,170,.18),transparent 55%),
var(--bg)}
.card{max-width:840px;margin:0 auto;border:1px solid var(--b);border-radius:18px;padding:14px;
background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04));
box-shadow:0 18px 60px rgba(0,0,0,.55)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
.box{border:1px solid var(--b);border-radius:16px;background:rgba(0,0,0,.18);padding:12px;margin-top:12px}
.pill{padding:8px 12px;border:1px solid var(--b);border-radius:999px;background:rgba(0,0,0,.25);font-weight:800}
.btn{border:1px solid var(--b);background:rgba(255,255,255,.06);color:var(--t);
padding:10px 12px;border-radius:14px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;gap:8px;align-items:center}
.btn:disabled{opacity:.55;cursor:not-allowed}
.g{background:var(--g)} .a{background:var(--a)} .r{background:var(--r)} .bl{background:var(--bl)}
.mini{color:var(--m);font-weight:750}
code{background:rgba(0,0,0,.35);padding:2px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.12)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;padding:10px 12px;border-radius:999px;
border:1px solid var(--b);background:rgba(0,0,0,.55);display:none;z-index:9999;max-width:min(92vw,760px);text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="title">Αγορά HELP (3)</div>
          <div class="sub">Πληρώνεις <b>€1,99</b> και ξεκλειδώνεις <b>3 HELP</b> για τον τρέχοντα διαγωνισμό.</div>
        </div>
        <span class="pill" id="contestPill">—</span>
      </div>

      <div class="box">
        <div class="row2">
          <div class="k">Σημείωση / Code</div>
          <code id="note">HELP</code>
        </div>
        <div class="muted">
          Θα ανοίξει ασφαλής σελίδα πληρωμής της Stripe. Μετά την πληρωμή θα γυρίσεις αυτόματα στο Dashboard.
        </div>
        <div class="msg ok" id="msgOk" style="display:none"></div>
        <div class="msg bad" id="msgBad" style="display:none"></div>
      </div>

      <div class="row">
        <a class="btn" href="dashboard.html">← Πίσω</a>
        <button class="btn g" id="buy" type="button">Αγορά €1,99 (Stripe)</button>
      </div>

      <div class="foot">
        <span>Αν κάτι δεν πάει καλά, στείλε μου screenshot από Console + Network.</span>
      </div>
    </div>
  </div>

<script type="module">
import { supabase } from "./supabase.js";

const $ = (id) => document.getElementById(id);
const show = (id, txt) => { const el=$(id); el.textContent = txt; el.style.display="block"; };
const hide = (id) => { const el=$(id); el.style.display="none"; };

function getContestCode() {
  return (localStorage.getItem("contestCode") || "").trim();
}

async function getActiveContest() {
  const { data, error } = await supabase
    .from("contests")
    .select("code,title")
    .eq("active", true)
    .limit(1)
    .maybeSingle();
  if (error) throw error;
  return data || null;
}

function setContestPill() {
  const code = getContestCode();
  $("contestPill").textContent = code ? ("Contest: " + code) : "Contest: —";
}

async function ensureAuth() {
  const { data } = await supabase.auth.getSession();
  return data?.session ?? null; // return full session
}

async function startCheckout() {
  hide("msgOk"); hide("msgBad");
  const btn = $("buy");
  btn.disabled = true;
  btn.textContent = "Φόρτωση…";

  try {
    const session = await ensureAuth();
    if (!session?.user) {
      show("msgBad", "Πρέπει να κάνεις login πρώτα.");
      // If opened directly without logging in, the Edge Function will return 401.
      return;
    }

    // Prefer contestCode from Dashboard, but if it's missing, fallback to the active contest in DB.
    let contest_code = getContestCode();
    if (!contest_code) {
      const active = await getActiveContest();
      contest_code = (active?.code || "").trim();
      if (contest_code) {
        localStorage.setItem("contestCode", contest_code);
        $("contestPill").textContent = active?.title
          ? `Contest: ${active.title} (${contest_code})`
          : `Contest: ${contest_code}`;
      }
    }
    if (!contest_code) {
      show("msgBad", "Δεν βρέθηκε ενεργός διαγωνισμός. Πήγαινε Dashboard και άνοιξε διαγωνισμό.");
      return;
    }

    // Call Edge Function -> returns { url }
    const { data, error } = await supabase.functions.invoke("create-checkout-session", {
      // Make the JWT explicit to avoid 401 when verify_jwt is enabled
      headers: { Authorization: `Bearer ${session.access_token}` },
      body: {
        contest_code,
        purchase_code: "HELP",
        origin: window.location.origin
      }
    });
    if (error) throw error;
    if (!data?.url) throw new Error("Δεν επέστρεψε checkout URL.");

    window.location.href = data.url;
  } catch (e) {
    console.error(e);
    show("msgBad", "Σφάλμα Stripe: " + (e?.message || String(e)));
  } finally {
    btn.disabled = false;
    btn.textContent = "Αγορά €1,99 (Stripe)";
  }
}

$("buy").addEventListener("click", startCheckout);
setContestPill();

// Optional message when coming back from Stripe
const qs = new URLSearchParams(location.search);
if (qs.get("canceled") === "1") {
  show("msgBad", "Η πληρωμή ακυρώθηκε.");
}
</script>
</body>
</html>
