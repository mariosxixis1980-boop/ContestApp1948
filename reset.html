<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reset Password</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b1220;
      color:#eaf1ff;
      font-family:system-ui,Segoe UI,Arial;
    }
    .card{
      width:min(420px,100%);
      background:#121a2f;
      border-radius:16px;
      padding:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.6);
    }
    h2{margin-top:0}
    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-top:10px;
      font-size:16px;
    }
    button{
      margin-top:12px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2ecc71;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .msg{margin-top:10px;font-weight:700; white-space:pre-wrap;}
  </style>
</head>

<body>
  <div class="card">
    <h2>🔑 Νέος κωδικός</h2>
    <p>Βάλε νέο password και πάτα αλλαγή.</p>

    <input id="newPass" type="password" placeholder="Νέος κωδικός"/>
    <button id="saveBtn">Αλλαγή κωδικού</button>

    <div id="msg" class="msg"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // ✅ ΒΑΛΕ ΤΑ ΣΩΣΤΑ (τα δικά σου είναι αυτά που μου έστειλες)
    const SUPABASE_URL = "https://qhgdcouuxtcjrlsztvwm.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_mRB7RNRcLPF9n1eMjhwa0Q_3ya9qB5q";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        detectSessionInUrl: true,
      }
    });

    const msg = document.getElementById("msg");
    const passInput = document.getElementById("newPass");
    const saveBtn = document.getElementById("saveBtn");

    function setError(text){
      msg.textContent = "❌ " + text;
      msg.style.color = "#ffb3b3";
    }
    function setOk(text){
      msg.textContent = "✅ " + text;
      msg.style.color = "#7CFFB2";
    }

    async function initSessionFromUrl() {
      // Υποστηρίζει και ?code= (PKCE) και #access_token= (παλιό)
      const qs = new URLSearchParams(location.search);
      const code = qs.get("code");

      if (code) {
        const { error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) throw error;
      }

      // Αν είναι hash tokens, detectSessionInUrl θα τα πιάσει αυτόματα
      // Αλλά κάνουμε ένα getSession για επιβεβαίωση
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;

      if (!data?.session) {
        throw new Error("Λείπει auth session. Άνοιξε ξανά το link από το email (σε αυτόν τον browser).");
      }
      return data.session;
    }

    // INIT
    (async () => {
      try {
        saveBtn.disabled = true;
        msg.textContent = "Φορτώνω session από το link...";
        msg.style.color = "#cfe3ff";

        await initSessionFromUrl();

        setOk("Έτοιμο. Βάλε νέο κωδικό και πάτα αλλαγή.");
        saveBtn.disabled = false;
      } catch (e) {
        console.error(e);
        setError(e?.message || "Δεν μπόρεσα να ανοίξω session από το link.");
        saveBtn.disabled = true;
      }
    })();

    // CHANGE PASSWORD
    saveBtn.addEventListener("click", async () => {
      const password = passInput.value.trim();
      if (password.length < 6) {
        setError("Τουλάχιστον 6 χαρακτήρες.");
        return;
      }

      saveBtn.disabled = true;
      msg.textContent = "Αλλάζω κωδικό...";
      msg.style.color = "#cfe3ff";

      try {
        const { error } = await supabase.auth.updateUser({ password });
        if (error) throw error;

        setOk("Ο κωδικός άλλαξε! Σε πάω στο login...");

        try { await supabase.auth.signOut(); } catch(_) {}
        setTimeout(() => location.replace("login.html"), 700);
      } catch (e) {
        console.error(e);
        setError(e?.message || "Αποτυχία αλλαγής κωδικού.");
        saveBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
